
name: Update

on:
  workflow_dispatch: # 允许在 Actions 页面手动触发(便于 arXiv 限流恢复后重跑)
  schedule:
      - cron: '30 16 * * 0-4' # 00:30 Beijing time every Monday to Friday
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write 

jobs:
  update_daily_papers:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run unit tests
      run: python -m unittest test_utils -v

    - name: Update papers
      run: |
        python main.py
    - name: Commit and push changes
      uses: github-actions-x/commit@v2.9
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        push-branch: 'main'
        commit-message: '✏️ Update papers automatically.'
        force-add: 'true'
        files: README.md INDEX.md .github/ISSUE_TEMPLATE.md
        name: guoyue0412
        email: 1601954018@qq.com

    - name: Create an issue to notify
      uses: JasonEtco/create-an-issue@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
